<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartCart OCR</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4.0.2/dist/tesseract.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 20px;
      background: #f0f0f0;
    }
    video {
      width: 100%;
      max-width: 400px;
      border-radius: 10px;
      margin-bottom: 10px;
    }
    #precos {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
    }
    .preco-btn {
      font-size: 1.2em;
      padding: 10px 20px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .lixeira {
      position: absolute;
      top: -8px;
      right: -8px;
      background: red;
      border-radius: 50%;
      color: white;
      font-size: 0.8em;
      cursor: pointer;
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #total {
      font-size: 2em;
      margin-top: 20px;
      color: #2E7D32;
    }
  </style>
</head>
<body>
  <h1>SmartCart OCR</h1>
  <video id="video" autoplay playsinline></video>
  <div id="precos"></div>
  <div id="total">Total: R$ <span id="soma">0.00</span></div>

  <script>
    const video = document.getElementById('video');
    const precosDiv = document.getElementById('precos');
    const somaSpan = document.getElementById('soma');
    let total = 0;
    let canvas = document.createElement('canvas');

    async function iniciarCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { exact: 'environment' } },
          audio: false
        });
        video.srcObject = stream;
      } catch (err) {
        alert("Erro ao acessar a câmera: " + err);
      }
    }

    function adicionarPreco(valor) {
      total += valor;
      somaSpan.innerText = total.toFixed(2);
    }

    function removerPreco(btn, valor) {
      total -= valor;
      if (total < 0) total = 0;
      somaSpan.innerText = total.toFixed(2);
      btn.remove();
    }

    async function capturarImagemEProcessar() {
      const ctx = canvas.getContext('2d');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

      let imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      for (let i = 0; i < imageData.data.length; i += 4) {
        let avg = (imageData.data[i] + imageData.data[i + 1] + imageData.data[i + 2]) / 3;
        imageData.data[i] = avg;
        imageData.data[i + 1] = avg;
        imageData.data[i + 2] = avg;
      }
      ctx.putImageData(imageData, 0, 0);

      const { data: { text } } = await Tesseract.recognize(canvas, 'eng', {
        tessedit_char_whitelist: '0123456789.,',
        tessedit_pageseg_mode: Tesseract.PSM.SINGLE_BLOCK
      });

      const matches = text.match(/\d{1,3}(?:[.,]\d{2})/g);
      precosDiv.innerHTML = '';

      if (matches) {
        matches.forEach(str => {
          const valor = parseFloat(str.replace(',', '.'));
          if (!isNaN(valor)) {
            const btn = document.createElement('div');
            btn.className = 'preco-btn';
            btn.innerText = `R$ ${valor.toFixed(2)}`;
            btn.onclick = () => adicionarPreco(valor);

            const lixeira = document.createElement('div');
            lixeira.className = 'lixeira';
            lixeira.innerText = '×';
            lixeira.onclick = (e) => {
              e.stopPropagation();
              removerPreco(btn, valor);
            };

            btn.appendChild(lixeira);
            precosDiv.appendChild(btn);
          }
        });
      } else {
        precosDiv.innerHTML = '<p>Nenhum preço detectado.</p>';
      }
    }

    setInterval(capturarImagemEProcessar, 2000);
    iniciarCamera();
  </script>
</body>
</html>
