
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartCart</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4.0.2/dist/tesseract.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 20px;
      background: #121212;
      color: #FFFFFF;
    }
    .container {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      flex-wrap: wrap;
      gap: 40px;
    }
    video {
      width: 100%;
      max-width: 400px;
      border-radius: 10px;
      margin-bottom: 10px;
    }
    #overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      max-width: 400px;
      height: auto;
      pointer-events: none;
    }
    #precos {
      display: flex;
      flex-direction: column;
      gap: 25px;
      max-height: 700px;
      overflow-y: auto;
    }
    .preco-btn {
      font-size: 3em;
      padding: 30px 50px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .btn-controle, .btn-total {
      margin-top: 40px;
    }
    .btn-controle button, .btn-total button {
      background: #FF5252;
      color: white;
      border: none;
      padding: 24px 48px;
      border-radius: 20px;
      font-size: 2em;
      cursor: pointer;
      margin: 20px;
    }
    #total {
      font-size: 4em;
      margin-top: 40px;
      color: #81C784;
    }
    #manualInput {
      margin-top: 40px;
    }
    #manualInput input {
      padding: 24px;
      font-size: 2.4em;
      border-radius: 20px;
      border: none;
      width: 240px;
      margin-right: 30px;
    }
    #manualInput button {
      font-size: 2.4em;
      padding: 24px 48px;
      background: #1E88E5;
      color: white;
      border: none;
      border-radius: 20px;
      cursor: pointer;
    }
  </style>
</head>
<body>
<!-- RESTANTE DO CÓDIGO PERMANECE O MESMO -->
</body>
</html>
