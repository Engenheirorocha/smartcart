<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartCart</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4.0.2/dist/tesseract.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 20px;
      background: #121212;
      color: #FFFFFF;
    }
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    .camera-wrapper {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    video {
      width: 100%;
      max-width: 400px;
      border-radius: 10px;
      margin-bottom: 10px;
    }
    #overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      max-width: 400px;
      height: auto;
      pointer-events: none;
    }
    #precos {
      display: flex;
      flex-direction: column;
      gap: 25px;
      max-height: 700px;
      overflow-y: auto;
    }
    .preco-btn {
      font-size: 3em;
      padding: 30px 50px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .btn-controle, .btn-total {
      margin-top: 20px;
    }
    .btn-controle button, .btn-total button {
      background: #FF5252;
      color: white;
      border: none;
      padding: 24px 48px;
      border-radius: 20px;
      font-size: 2em;
      cursor: pointer;
      margin: 10px;
    }
    #total {
      font-size: 4em;
      margin-top: 30px;
      color: #81C784;
    }
    #manualInput {
      margin-top: 30px;
    }
    #manualInput input {
      padding: 24px;
      font-size: 2.4em;
      border-radius: 20px;
      border: none;
      width: 240px;
      margin-right: 30px;
    }
    #manualInput button {
      font-size: 2.4em;
      padding: 24px 48px;
      background: #1E88E5;
      color: white;
      border: none;
      border-radius: 20px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>SmartCart</h1>
  <div class="container">
    <div class="camera-wrapper">
      <video id="video" autoplay playsinline></video>
      <canvas id="overlay"></canvas>

      <div class="btn-controle">
        <button onclick="limparSugestoes()">❌ Apagar sugestões</button>
        <button onclick="desfazerUltimo()">↩️ Desfazer último</button>
      </div>

      <div id="manualInput">
        <input type="number" id="valorManual" step="0.01" placeholder="0.00">
        <button onclick="adicionarManual()">➕ Adicionar</button>
      </div>

      <div id="total">Total: R$ <span id="soma">0.00</span></div>

      <div class="btn-total">
        <button onclick="zerarTotal()">🔄 Zerar Total</button>
      </div>
    </div>

    <div id="precos"></div>
  </div>

  <script>
    async function iniciarCamera() {
      const video = document.getElementById("video");
      try {
        const constraints = {
          video: {
            facingMode: { ideal: "environment" }
          },
          audio: false
        };

        const stream = await navigator.mediaDevices.getUserMedia(constraints);
        video.srcObject = stream;
      } catch (err) {
        console.warn("Fallback para câmera padrão.", err);
        try {
          const fallbackStream = await navigator.mediaDevices.getUserMedia({ video: true });
          video.srcObject = fallbackStream;
        } catch (erroFinal) {
          console.error("Erro ao acessar qualquer câmera:", erroFinal);
          const mensagem = document.createElement('p');
          mensagem.textContent = "Câmera não disponível. Verifique permissões ou tente em outro navegador.";
          mensagem.style.color = "#FF5252";
          document.querySelector(".camera-wrapper").appendChild(mensagem);
        }
      }
    }
    iniciarCamera();
  </script>
</body>
</html>
